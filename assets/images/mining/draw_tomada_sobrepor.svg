<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <!-- Corpo da carcaça -->
  <rect x="28" y="42" width="144" height="148" rx="8" fill="#dde3ec" stroke="#1a2744" stroke-width="2.5"/>
  <!-- Profundidade / sombra lateral -->
  <rect x="172" y="46" width="6" height="140" rx="2" fill="#b8c4d4"/>
  <rect x="28" y="190" width="150" height="6" rx="2" fill="#b8c4d4"/>
  <!-- Orelhas de fixação - topo -->
  <rect x="4" y="55" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="17" cy="68" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="13" y1="68" x2="21" y2="68" stroke="#1a2744" stroke-width="1.2"/>
  <rect x="170" y="55" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="183" cy="68" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="179" y1="68" x2="187" y2="68" stroke="#1a2744" stroke-width="1.2"/>
  <!-- Orelhas de fixação - base -->
  <rect x="4" y="151" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="17" cy="164" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="13" y1="164" x2="21" y2="164" stroke="#1a2744" stroke-width="1.2"/>
  <rect x="170" y="151" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="183" cy="164" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="179" y1="164" x2="187" y2="164" stroke="#1a2744" stroke-width="1.2"/>
  <!-- Face circular escura -->
  <circle cx="100" cy="116" r="60" fill="#1a2744"/>
  <circle cx="100" cy="116" r="55" fill="#1f3060"/>
  <!-- Anel externo de detalhe -->
  <circle cx="100" cy="116" r="55" fill="none" stroke="#2e4580" stroke-width="2"/>
  <!-- Notch de indexação (posição horária) -->
  <rect x="93" y="57" width="14" height="11" rx="3" fill="#c0392b"/>
  <!-- Contato terra (T) — retangular, topo -->
  <rect x="93" y="72" width="14" height="24" rx="4" fill="#dde3ec"/>
  <!-- Contatos de fase (L1 e L2) -->
  <ellipse cx="76" cy="138" rx="9" ry="11" fill="#dde3ec"/>
  <ellipse cx="124" cy="138" rx="9" ry="11" fill="#dde3ec"/>
  <!-- Entrada de cabo - base -->
  <rect x="82" y="188" width="36" height="12" rx="3" fill="#1a2744" stroke="#1a2744" stroke-width="1"/>
  <rect x="88" y="200" width="24" height="20" rx="4" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.5"/>
  <!-- Badge IP67 -->
  <rect x="36" y="46" width="44" height="14" rx="3" fill="#1a2744"/>
  <text x="58" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="white" font-weight="bold">IP 67</text>
  <!-- Label BM/ -->
  <rect x="124" y="46" width="38" height="14" rx="3" fill="#c0392b"/>
