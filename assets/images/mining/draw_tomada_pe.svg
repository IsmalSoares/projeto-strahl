<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- Corpo da carcaça (mais alto — acomoda o módulo PE) -->
  <rect x="28" y="22" width="144" height="186" rx="8" fill="#dde3ec" stroke="#1a2744" stroke-width="2.5"/>
  <!-- Profundidade -->
  <rect x="172" y="26" width="6" height="178" rx="2" fill="#b8c4d4"/>
  <rect x="28" y="208" width="150" height="6" rx="2" fill="#b8c4d4"/>
  <!-- Módulo de Proteção Elétrica - topo -->
  <rect x="38" y="28" width="124" height="38" rx="5" fill="#1a2744" stroke="#0e1830" stroke-width="1"/>
  <!-- Janela de sinalização LED -->
  <rect x="48" y="35" width="18" height="10" rx="2" fill="#c0392b" opacity="0.85"/>
  <rect x="72" y="35" width="18" height="10" rx="2" fill="#27ae60" opacity="0.85"/>
  <!-- Botão / atuador de proteção -->
  <circle cx="136" cy="47" r="10" fill="#e8ecf4" stroke="#1a2744" stroke-width="1.5"/>
  <circle cx="136" cy="47" r="6" fill="#c0392b"/>
  <!-- Símbolo de cadeado (bloqueio) -->
  <rect x="110" y="43" width="14" height="11" rx="2" fill="white" stroke="#1a2744" stroke-width="1.2"/>
  <path d="M113 43 Q113 38 117 38 Q121 38 121 43" fill="none" stroke="white" stroke-width="1.8"/>
  <circle cx="117" cy="49" r="2" fill="#1a2744"/>
  <!-- Linha divisória módulo PE / tomada -->
  <line x1="38" y1="66" x2="162" y2="66" stroke="#1a2744" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Orelhas de fixação -->
  <rect x="4" y="78" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="17" cy="91" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="13" y1="91" x2="21" y2="91" stroke="#1a2744" stroke-width="1.2"/>
  <rect x="170" y="78" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="183" cy="91" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="179" y1="91" x2="187" y2="91" stroke="#1a2744" stroke-width="1.2"/>
  <rect x="4" y="166" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="17" cy="179" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="13" y1="179" x2="21" y2="179" stroke="#1a2744" stroke-width="1.2"/>
  <rect x="170" y="166" width="26" height="26" rx="5" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.8"/>
  <circle cx="183" cy="179" r="5.5" fill="white" stroke="#1a2744" stroke-width="1.5"/>
  <line x1="179" y1="179" x2="187" y2="179" stroke="#1a2744" stroke-width="1.2"/>
  <!-- Face circular -->
  <circle cx="100" cy="138" r="58" fill="#1a2744"/>
  <circle cx="100" cy="138" r="53" fill="#1f3060"/>
  <circle cx="100" cy="138" r="53" fill="none" stroke="#2e4580" stroke-width="2"/>
  <!-- Notch -->
  <rect x="93" y="81" width="14" height="11" rx="3" fill="#c0392b"/>
  <!-- Contato terra -->
  <rect x="93" y="96" width="14" height="23" rx="4" fill="#dde3ec"/>
  <!-- Contatos de fase -->
  <ellipse cx="76" cy="158" rx="9" ry="11" fill="#dde3ec"/>
  <ellipse cx="124" cy="158" rx="9" ry="11" fill="#dde3ec"/>
  <!-- Entrada de cabo -->
  <rect x="82" y="206" width="36" height="12" rx="3" fill="#1a2744"/>
  <rect x="88" y="218" width="24" height="18" rx="4" fill="#c8d4e4" stroke="#1a2744" stroke-width="1.5"/>
  <!-- Badges -->
  <rect x="36" y="25" width="44" height="13" rx="3" fill="#c0392b"/>
  <text x="58" y="34.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="white" font-weight="bold">PE/</text>
  <rect x="86" y="25" width="72" height="13" rx="3" fill="#1a2744"/>
  <text x="122" y="34.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">PROT. ELÉTRICA</text>
</svg>
